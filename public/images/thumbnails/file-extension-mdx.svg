<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MDX file extension thumbnail</title>
  <desc id="desc">A dark technical thumbnail showing the MDX extension connecting Markdown and React components.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#0b1b3a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" x2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#38bdf8" stroke-opacity=".08"/>
    </pattern>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <path d="M80 500C225 428 314 516 456 444C591 376 645 251 796 245C923 240 995 316 1135 244" fill="none" stroke="#22d3ee" stroke-opacity=".18" stroke-width="3"/>
  <path d="M72 557C254 468 342 567 526 480C690 402 722 318 850 319C983 320 1022 398 1148 346" fill="none" stroke="#a855f7" stroke-opacity=".18" stroke-width="3"/>
  <g transform="translate(70 96)">
    <text x="0" y="72" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="96" font-weight="800" letter-spacing="-2">.mdx</text>
    <text x="4" y="127" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Markdown + JSX</text>
    <rect x="4" y="158" width="326" height="6" rx="3" fill="url(#cyan)" filter="url(#glow)"/>
  </g>
  <g transform="translate(70 315)">
    <rect width="320" height="210" rx="24" fill="#020617" fill-opacity=".72" stroke="#38bdf8" stroke-opacity=".45"/>
    <text x="34" y="58" fill="#93c5fd" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="24" font-weight="700"># Article</text>
    <text x="34" y="103" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">- Markdown text</text>
    <text x="34" y="143" fill="#e5e7eb" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">- Code fences</text>
    <text x="34" y="183" fill="#22d3ee" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="21">&lt;Callout /&gt;</text>
  </g>
  <g transform="translate(505 256)" filter="url(#glow)">
    <path d="M0 82H137" stroke="#38bdf8" stroke-width="10" stroke-linecap="round"/>
    <path d="M107 34L163 82L107 130" fill="none" stroke="#38bdf8" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g transform="translate(735 160)">
    <rect width="370" height="332" rx="30" fill="#050816" fill-opacity=".82" stroke="#8b5cf6" stroke-opacity=".52"/>
    <rect x="38" y="40" width="294" height="84" rx="18" fill="#111827" stroke="#22d3ee" stroke-opacity=".38"/>
    <text x="70" y="93" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">React Component</text>
    <rect x="38" y="154" width="126" height="106" rx="20" fill="url(#cyan)" opacity=".18" stroke="#22d3ee" stroke-opacity=".55"/>
    <rect x="206" y="154" width="126" height="106" rx="20" fill="url(#violet)" opacity=".18" stroke="#c084fc" stroke-opacity=".55"/>
    <text x="76" y="219" fill="#67e8f9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">MD</text>
    <text x="244" y="219" fill="#f0abfc" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">JSX</text>
    <text x="40" y="303" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">docs / blog / knowledge base</text>
  </g>
</svg>
