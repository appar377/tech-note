<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Git switch and checkout thumbnail</title>
  <desc id="desc">Git command cover comparing branch switching and legacy checkout behavior.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0C1222"/>
      <stop offset="1" stop-color="#132018"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#34D399" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34D399" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.7"/>
  <path d="M-60 580C170 456 293 528 514 406C726 289 857 114 1264 156V735H-60Z" fill="#34D399" opacity="0.13"/>
  <path d="M741 -80L1268 151V675H974L597 96Z" fill="#60A5FA" opacity="0.14"/>
  <rect x="-120" y="210" width="1440" height="86" transform="rotate(-10 600 253)" fill="url(#shine)" opacity="0.8"/>
  <rect x="28" y="28" width="1144" height="619" rx="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <rect x="72" y="72" width="240" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <circle cx="94" cy="93" r="6" fill="#34D399"/>
    <text x="112" y="99" fill="#DDE6F3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="750" text-anchor="start">Git Commands</text>
    <text x="72" y="188" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="68" font-weight="850" text-anchor="start">SWITCH</text>
  <text x="72" y="264" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="68" font-weight="850" text-anchor="start">CHECKOUT</text>
    <path d="M74 358H334" stroke="#34D399" stroke-width="9" stroke-linecap="round"/>
    <path d="M356 358H430" stroke="#60A5FA" stroke-width="9" stroke-linecap="round" opacity="0.72"/>
    <text x="72" y="416" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="28" font-weight="650" text-anchor="start">Branch operation separated from restore</text>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" filter="url(#softShadow)">
    <rect x="524" y="158" width="612" height="370" rx="30" fill="#06111E" fill-opacity="0.84" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <rect x="560" y="198" width="540" height="236" rx="20" fill="#0B1020" stroke="#FFFFFF" stroke-opacity="0.12"/>
    <text x="594" y="258" fill="#34D399" font-family="JetBrains Mono, SFMono-Regular, Consolas, ui-monospace, monospace" font-size="24" font-weight="800" text-anchor="start">$ git switch feature/login</text>
    <text x="594" y="314" fill="#60A5FA" font-family="JetBrains Mono, SFMono-Regular, Consolas, ui-monospace, monospace" font-size="24" font-weight="800" text-anchor="start">$ git restore app.rb</text>
    <text x="594" y="370" fill="#CBD5E1" font-family="JetBrains Mono, SFMono-Regular, Consolas, ui-monospace, monospace" font-size="24" font-weight="800" text-anchor="start">$ git checkout legacy</text>
    <rect x="602" y="462" width="178" height="44" rx="14" fill="#34D399" fill-opacity="0.18" stroke="#34D399" stroke-opacity="0.55"/>
    <text x="691" y="491" fill="#D1FAE5" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="18" font-weight="850" text-anchor="middle">branch</text>
    <rect x="822" y="462" width="178" height="44" rx="14" fill="#FBBF24" fill-opacity="0.18" stroke="#FBBF24" stroke-opacity="0.55"/>
    <text x="911" y="491" fill="#FEF3C7" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="18" font-weight="850" text-anchor="middle">file state</text>
  </g>
</svg>
