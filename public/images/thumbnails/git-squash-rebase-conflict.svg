    <path d="M766 352C858 352 858 454 952 454H1058" stroke="#34D399" stroke-width="16" stroke-linecap="round"/>
    <circle cx="598" cy="352" r="24" fill="#E5E7EB"/>
    <circle cx="766" cy="352" r="24" fill="#E5E7EB"/>
    <circle cx="950" cy="250" r="24" fill="#E5E7EB"/>
    <circle cx="1052" cy="250" r="24" fill="#E5E7EB"/>
    <circle cx="952" cy="454" r="24" fill="#34D399"/>
    <circle cx="1058" cy="454" r="24" fill="#34D399"/>
