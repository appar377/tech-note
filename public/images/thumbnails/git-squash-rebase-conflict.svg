<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Git squash merge rebase conflict thumbnail</title>
  <desc id="desc">Git history cover explaining conflicts after squash merge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0B1120"/>
      <stop offset="1" stop-color="#18181B"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#34D399" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34D399" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.7"/>
  <path d="M-60 580C170 456 293 528 514 406C726 289 857 114 1264 156V735H-60Z" fill="#34D399" opacity="0.13"/>
  <path d="M741 -80L1268 151V675H974L597 96Z" fill="#94A3B8" opacity="0.14"/>
  <rect x="-120" y="210" width="1440" height="86" transform="rotate(-10 600 253)" fill="url(#shine)" opacity="0.8"/>
  <rect x="28" y="28" width="1144" height="619" rx="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <rect x="72" y="72" width="240" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <circle cx="94" cy="93" r="6" fill="#34D399"/>
    <text x="112" y="99" fill="#DDE6F3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="750" text-anchor="start">Git History</text>
    <text x="72" y="188" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="68" font-weight="850" text-anchor="start">SQUASH</text>
  <text x="72" y="264" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="68" font-weight="850" text-anchor="start">MERGE</text>
    <path d="M74 358H334" stroke="#34D399" stroke-width="9" stroke-linecap="round"/>
    <path d="M356 358H430" stroke="#94A3B8" stroke-width="9" stroke-linecap="round" opacity="0.72"/>
    <text x="72" y="416" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="28" font-weight="650" text-anchor="start">Why conflicts happen after rebase</text>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" filter="url(#softShadow)">
    <rect x="520" y="160" width="616" height="368" rx="30" fill="#070B14" fill-opacity="0.82" stroke="#FFFFFF" stroke-opacity="0.12"/>
