    <text x="894" y="329" fill="#FECACA" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="32" font-weight="850" text-anchor="middle">conflict</text>
    <text x="580" y="500" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="24" font-weight="750" text-anchor="start">D/E/F are not S</text>
