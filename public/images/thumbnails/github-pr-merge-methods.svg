<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GitHub pull request merge methods thumbnail</title>
  <desc id="desc">Pull request cover comparing merge commit, squash merge, and rebase merge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#08111F"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#60A5FA" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#60A5FA" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)" opacity="0.7"/>
  <path d="M-60 580C170 456 293 528 514 406C726 289 857 114 1264 156V735H-60Z" fill="#60A5FA" opacity="0.13"/>
  <path d="M741 -80L1268 151V675H974L597 96Z" fill="#34D399" opacity="0.14"/>
  <rect x="-120" y="210" width="1440" height="86" transform="rotate(-10 600 253)" fill="url(#shine)" opacity="0.8"/>
  <rect x="28" y="28" width="1144" height="619" rx="34" fill="none" stroke="#FFFFFF" stroke-opacity="0.09"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif">
    <rect x="72" y="72" width="247" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.16"/>
    <circle cx="94" cy="93" r="6" fill="#60A5FA"/>
    <text x="112" y="99" fill="#DDE6F3" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="22" font-weight="750" text-anchor="start">GitHub Pull Request</text>
    <text x="72" y="188" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="68" font-weight="850" text-anchor="start">MERGE</text>
  <text x="72" y="264" fill="#FFFFFF" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="68" font-weight="850" text-anchor="start">METHODS</text>
    <path d="M74 358H334" stroke="#60A5FA" stroke-width="9" stroke-linecap="round"/>
    <path d="M356 358H430" stroke="#34D399" stroke-width="9" stroke-linecap="round" opacity="0.72"/>
    <text x="72" y="416" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="28" font-weight="650" text-anchor="start">Merge commit / squash / rebase</text>
  </g>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" filter="url(#softShadow)">
    <rect x="548" y="176" width="170" height="300" rx="24" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="566" y="206" width="134" height="48" rx="14" fill="#60A5FA" fill-opacity="0.95"/>
    <text x="633" y="237" fill="#06111F" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="17" font-weight="850" text-anchor="middle">merge commit</text>
    <path d="M582 330H684" stroke="#60A5FA" stroke-width="8" stroke-linecap="round"/>
    <path d="M582 374H684" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" opacity="0.72"/>
    <text x="633" y="432" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">branch kept</text>
    <rect x="742" y="176" width="170" height="300" rx="24" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="760" y="206" width="134" height="48" rx="14" fill="#34D399" fill-opacity="0.95"/>
    <text x="827" y="237" fill="#06111F" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="17" font-weight="850" text-anchor="middle">squash</text>
    <path d="M776 330H878" stroke="#34D399" stroke-width="8" stroke-linecap="round"/>
    <path d="M776 374H878" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" opacity="0.72"/>
    <text x="827" y="432" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">1 PR = 1 commit</text>
    <rect x="936" y="176" width="170" height="300" rx="24" fill="#FFFFFF" fill-opacity="0.10" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="954" y="206" width="134" height="48" rx="14" fill="#A78BFA" fill-opacity="0.95"/>
    <text x="1021" y="237" fill="#06111F" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="17" font-weight="850" text-anchor="middle">rebase</text>
    <path d="M970 330H1072" stroke="#A78BFA" stroke-width="8" stroke-linecap="round"/>
    <path d="M970 374H1072" stroke="#E2E8F0" stroke-width="8" stroke-linecap="round" opacity="0.72"/>
    <text x="1021" y="432" fill="#CBD5E1" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="16" font-weight="750" text-anchor="middle">linear history</text>
  </g>
</svg>
