<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Next.js static export to GitHub Pages thumbnail</title>
  <desc id="desc">Next.js deployment pipeline cover for GitHub Pages static export.</desc>
  <defs>
